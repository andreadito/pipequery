name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump level'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      packages:
        description: 'Which packages to release'
        required: true
        type: choice
        options:
          - all
          - engine
          - cli

permissions:
  contents: write
  packages: write

jobs:
  # ─── Version Bump ───────────────────────────────────────────────────────────
  version-bump:
    runs-on: ubuntu-latest
    outputs:
      engine-version: ${{ steps.bump.outputs.engine-version }}
      cli-version: ${{ steps.bump.outputs.cli-version }}
      release-tag: ${{ steps.bump.outputs.release-tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump versions
        id: bump
        run: |
          BUMP="${{ inputs.bump }}"
          PACKAGES="${{ inputs.packages }}"
          COMMIT_MSG="release:"
          RELEASE_TAG=""

          # Bump engine version
          if [[ "$PACKAGES" == "all" || "$PACKAGES" == "engine" ]]; then
            cd $GITHUB_WORKSPACE
            npm version "$BUMP" --no-git-tag-version
            ENGINE_VERSION=$(node -p "require('./package.json').version")
            echo "engine-version=$ENGINE_VERSION" >> "$GITHUB_OUTPUT"
            COMMIT_MSG="$COMMIT_MSG engine v$ENGINE_VERSION"
            RELEASE_TAG="v$ENGINE_VERSION"
          fi

          # Bump CLI version
          if [[ "$PACKAGES" == "all" || "$PACKAGES" == "cli" ]]; then
            cd $GITHUB_WORKSPACE/cli
            npm version "$BUMP" --no-git-tag-version
            CLI_VERSION=$(node -p "require('./package.json').version")
            echo "cli-version=$CLI_VERSION" >> "$GITHUB_OUTPUT"
            COMMIT_MSG="$COMMIT_MSG cli v$CLI_VERSION"
            if [[ -z "$RELEASE_TAG" ]]; then
              RELEASE_TAG="cli-v$CLI_VERSION"
            fi
          fi

          echo "release-tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

          # Commit and tag
          cd $GITHUB_WORKSPACE
          git add -A
          git commit -m "$COMMIT_MSG"

          if [[ "$PACKAGES" == "all" || "$PACKAGES" == "engine" ]]; then
            git tag "v$ENGINE_VERSION"
          fi
          if [[ "$PACKAGES" == "all" || "$PACKAGES" == "cli" ]]; then
            git tag "cli-v$CLI_VERSION"
          fi

          git push origin main --tags

  # ─── Test ───────────────────────────────────────────────────────────────────
  test:
    needs: version-bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install and test engine
        run: |
          npm ci
          npm run build
          npm test

      - name: Install and build CLI
        working-directory: cli
        run: |
          npm ci
          npm run build

      - name: Test CLI
        working-directory: cli
        run: npm test

  # ─── Publish Engine to GitHub Packages ──────────────────────────────────────
  publish-engine:
    needs: test
    if: inputs.packages == 'all' || inputs.packages == 'engine'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Publish Engine to Public npm (mirror) ──────────────────────────────────
  publish-engine-npm:
    needs: test
    if: inputs.packages == 'all' || inputs.packages == 'engine'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Rename package for public npm
        run: |
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.name = "@vaultgradient/pipequery-lang";
            delete pkg.publishConfig;
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2));
          '

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Publish CLI to GitHub Packages ─────────────────────────────────────────
  publish-cli:
    needs: test
    if: inputs.packages == 'all' || inputs.packages == 'cli'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - name: Install and build
        working-directory: cli
        run: |
          npm ci
          npm run build

      - name: Publish
        working-directory: cli
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Publish CLI to Public npm (mirror) ─────────────────────────────────────
  publish-cli-npm:
    needs: test
    if: inputs.packages == 'all' || inputs.packages == 'cli'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install and build
        working-directory: cli
        run: |
          npm ci
          npm run build

      - name: Rename package for public npm
        working-directory: cli
        run: |
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.name = "@vaultgradient/pipequery-cli";
            delete pkg.publishConfig;
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2));
          '

      - name: Publish
        working-directory: cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── Build and Push Docker Image to GHCR ───────────────────────────────────
  docker:
    needs: [version-bump, publish-cli]
    if: inputs.packages == 'all' || inputs.packages == 'cli'
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.version-bump.outputs.cli-version }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ─── Smoke Test: Docker ─────────────────────────────────────────────────────
  smoke-test-docker:
    needs: [version-bump, docker]
    if: inputs.packages == 'all' || inputs.packages == 'cli'
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository }}:${{ needs.version-bump.outputs.cli-version }}
    steps:
      - name: Pull image
        run: docker pull "$IMAGE"

      - name: Start container
        run: |
          docker run -d --name pq-smoke -p 3099:3000 "$IMAGE"
          sleep 3
          docker ps --format '{{.Names}}' | grep -q pq-smoke

      - name: Verify pq --help
        run: docker exec pq-smoke pq --help

      - name: Verify server responds
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3099/)
          [[ "$HTTP_CODE" =~ ^(200|404)$ ]]

      - name: Add source, endpoint, and query
        run: |
          docker exec pq-smoke pq source add testapi -t rest -u "https://jsonplaceholder.typicode.com/todos" -i 60s
          sleep 2
          docker exec pq-smoke pq endpoint add /api/todos -q "testapi | first(3)"
          sleep 1
          curl -s http://localhost:3099/api/todos | grep -q "title"
          docker exec pq-smoke pq query "testapi | count()" -f json | grep -qE "[0-9]"

      - name: Cleanup
        if: always()
        run: docker rm -f pq-smoke || true

  # ─── Smoke Test: CLI ──────────────────────────────────────────────────────
  smoke-test-cli:
    needs: publish-cli
    if: inputs.packages == 'all' || inputs.packages == 'cli'
    runs-on: ubuntu-latest
    steps:
      - name: Install CLI from GitHub Packages
        run: |
          mkdir test-cli && cd test-cli
          npm init -y
          echo "@andreadito:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          npm install @andreadito/pq

      - name: Verify pq --help and --version
        working-directory: test-cli
        run: |
          npx pq --help | grep -qi "pipequery\|usage\|serve"
          npx pq --version | grep -qE "^[0-9]+\.[0-9]+\.[0-9]+"

      - name: Init, serve, add source, query, stop
        working-directory: test-cli
        run: |
          npx pq init
          test -f pipequery.yaml
          npx pq serve -p 3098 -d
          sleep 2
          curl -s -o /dev/null -w "%{http_code}" http://localhost:3098/ | grep -qE "200|404"
          npx pq source add todos -t rest -u "https://jsonplaceholder.typicode.com/todos" -i 60s
          sleep 2
          npx pq endpoint add /api/top -q "todos | where(completed == true) | first(5)"
          sleep 1
          curl -s http://localhost:3098/api/top | grep -q "title"
          npx pq query "todos | count()" -f json | grep -qE "[0-9]"
          npx pq stop

  # ─── Smoke Test: Engine ────────────────────────────────────────────────────
  smoke-test-engine:
    needs: publish-engine
    if: inputs.packages == 'all' || inputs.packages == 'engine'
    runs-on: ubuntu-latest
    steps:
      - name: Install engine from GitHub Packages
        run: |
          mkdir test-engine && cd test-engine
          npm init -y
          echo "@andreadito:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> .npmrc
          node -e "const p=require('./package.json'); p.type='module'; require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"
          npm install @andreadito/pipequery-lang

      - name: Test ESM import and query execution
        working-directory: test-engine
        run: |
          cat > test.mjs << 'EOF'
          import { parseQuery, query } from "@andreadito/pipequery-lang";

          // Test parse
          const ast = parseQuery("data | where(price > 100) | sort(price desc) | first(5)");
          if (!ast) { console.error("parseQuery failed"); process.exit(1); }
          console.log("parseQuery OK");

          // Test execute
          const data = [
            { name: "Alice", age: 30 },
            { name: "Bob", age: 25 },
            { name: "Charlie", age: 35 },
          ];
          const result = query(data, "where(age > 28) | sort(age desc)");
          if (!Array.isArray(result) || result[0].name !== "Charlie") {
            console.error("query() wrong result:", result);
            process.exit(1);
          }
          console.log("query OK:", JSON.stringify(result));
          EOF
          node test.mjs

      - name: Test CJS require
        working-directory: test-engine
        run: |
          cat > test.cjs << 'EOF'
          const pq = require("@andreadito/pipequery-lang");
          const keys = Object.keys(pq);
          if (keys.length === 0) { console.error("empty exports"); process.exit(1); }
          console.log("CJS OK:", keys.join(", "));
          EOF
          node test.cjs

  # ─── Create GitHub Release ──────────────────────────────────────────────────
  github-release:
    needs: [version-bump, test, publish-engine, publish-engine-npm, publish-cli, publish-cli-npm, docker, smoke-test-docker, smoke-test-cli, smoke-test-engine]
    if: always() && needs.test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.version-bump.outputs.release-tag }}"
          gh release create "$TAG" \
            --title "Release $TAG" \
            --generate-notes
